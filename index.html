<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Assistant Pro</title>
    <style>
        :root {
            --bg-color: #fbfbfd;
            --text-color: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0066cc;
            --border-color: #d2d2d7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #app-container {
            width: 100%; max-width: 760px; display: flex; flex-direction: column;
            height: 100vh; padding: 40px 20px 0 20px; box-sizing: border-box;
        }

        h3 { text-align: center; font-weight: 600; font-size: 14px; letter-spacing: 0.5px; color: var(--text-secondary); margin: 0 0 5px 0; text-transform: uppercase; }
        .status { text-align: center; font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; min-height: 20px; }

        #output { flex-grow: 1; overflow-y: auto; padding-right: 10px; margin-bottom: 20px; scroll-behavior: smooth; }
        #output::-webkit-scrollbar { width: 6px; }
        #output::-webkit-scrollbar-track { background: transparent; }
        #output::-webkit-scrollbar-thumb { background: #e5e5ea; border-radius: 10px; }

        .message-block { margin-bottom: 30px; animation: fadeAndSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); }
        .role-label { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .role-user { color: var(--text-secondary); }
        .role-ai { color: var(--accent-color); }
        .message-content { font-size: 18px; line-height: 1.6; color: var(--text-color); white-space: pre-wrap; }

        #input-container { padding-bottom: 40px; background: linear-gradient(to top, var(--bg-color) 60%, transparent); }
        #input-area {
            width: 100%; padding: 18px 24px; font-size: 16px; border: 1px solid var(--border-color);
            border-radius: 30px; background: #ffffff; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease; box-sizing: border-box; font-family: inherit; outline: none; color: var(--text-color);
        }
        #input-area:focus { border-color: var(--accent-color); box-shadow: 0 4px 24px rgba(0, 102, 204, 0.12); }

        @keyframes fadeAndSlideIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app-container">
        <h3>Support Center (Llama 3.1)</h3>
        <div id="status" class="status">Inizializzazione motore AI in corso...</div>
        <div id="output"></div>
        <div id="input-container">
            <input type="text" id="input-area" placeholder="Scrivi il sintomo o la richiesta del cliente..." autocomplete="off" disabled>
        </div>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const statusLabel = document.getElementById("status");
        const output = document.getElementById("output");
        const inputArea = document.getElementById("input-area");

        // Usiamo il modello pesante e performante: Llama 3.1 (8B)
        const selectedModel = "Llama-3.1-8B-Instruct-q4f16_1-MLC";

        async function init() {
            const engine = new webllm.MLCEngine();

            engine.setInitProgressCallback((report) => {
                statusLabel.innerText = report.text;
                if (report.progress === 1) {
                    statusLabel.innerText = "Sistema Operativo - Pronto";
                }
            });

            try {
                await engine.reload(selectedModel);
                inputArea.disabled = false;
                inputArea.focus();
            } catch (e) {
                statusLabel.innerText = "Errore di connessione.";
                console.error(e);
            }

            inputArea.addEventListener("keypress", async (e) => {
                if (e.key === "Enter" && inputArea.value.trim() !== "") {
                    const prompt = inputArea.value;
                    inputArea.value = "";
                    
                    output.innerHTML += `
                        <div class="message-block">
                            <div class="role-label role-user">Tu</div>
                            <div class="message-content" style="color: var(--text-secondary);">${prompt}</div>
                        </div>`;
                    
                    output.scrollTop = output.scrollHeight;
                    statusLabel.innerText = "Elaborazione in corso...";
                    
                    // Regole rigide per evitare allucinazioni
                    const messages = [
                        { role: "system", content: "Sei un assistente tecnico IT pragmatico. Rispondi in italiano in modo estremamente semplice, passo-passo e senza usare termini tecnici inutili o inventati. Se una procedura è banale, non complicarla." },
                        { role: "user", content: prompt }
                    ];
                    
                    // Temperatura bassa per risposte logiche e precise
                    const reply = await engine.chat.completions.create({ 
                        messages: messages,
                        temperature: 0.2
                    });
                    
                    output.innerHTML += `
                        <div class="message-block">
                            <div class="role-label role-ai">Assistente</div>
                            <div class="message-content">${reply.choices[0].message.content}</div>
                        </div>`;
                        
                    output.scrollTop = output.scrollHeight;
                    statusLabel.innerText = "Sistema Operativo - Pronto";
                }
            });
        }

        init();
    </script>
</body>
</html>
